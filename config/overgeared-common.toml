
["Stone Smithing Anvil"]
	#Number of uses before the Stone Smithing Anvil breaks. Set to 0 to disable.
	#Range: > 0
	max_uses = 64
	#Enable Stone Smithing Anvil turns into cobblestone after falling
	enableAnvilToStone = true

["Durability Bonuses"]
	#Range: -5.0 ~ 5.0
	masterDurabilityBonus = 1.6
	#Range: -5.0 ~ 5.0
	perfectDurabilityBonus = 1.5
	#Range: -5.0 ~ 5.0
	expertDurabilityBonus = 1.3
	#Range: -5.0 ~ 5.0
	wellDurabilityBonus = 1.0
	#Range: 0.0 ~ 5.0
	poorDurabilityBonus = 0.7

["Anvil Conversion"]
	#Allow shift-right-clicking stone to convert into Stone Smithing Anvil
	enableStoneToAnvil = true
	#Allow shift-right-clicking vanilla anvil to convert into Smithing Anvil
	enableAnvilToSmithing = true
	#Requires blueprint to obtain higher quality items
	enableBlueprintForging = true

["Heated Items"]
	#How many ticks before a heated item cools off in inventory (default: 1200 = 60s)
	#Range: > 1
	heatedItemCooldownTicks = 1200

["Durability & Grinding"]
	#Defines the base durability multiplier of all items that has durability.
	#Range: 0.0 ~ 10000.0
	durability = 3.0
	#Items or tags that will NOT receive base durability multiplier
	base_durability_blacklist = ["takesapillage:ravager_horn", "medieval_healing:suture_kit", "mca:staff_of_life", "kubejs:primitive_tongs", "hexerei:broom_brush"]
	#Can the grindstone be used for restoring durability or not
	grindingToggle = true
	#Items or tags that cannot be repaired or affected by grinding. Prefix with '#' to use a tag, e.g. '#forge:ingots/iron'
	grindingBlacklist = ["minecraft:elytra", "#forge:armors", "#forge:armor"]
	#How much the item durability reduce per grindstone use
	#Range: 0.0 ~ 1.0
	durabilityReduce = 0.01
	#How much the item's durability restore per grindstone use
	#Range: 0.0 ~ 1.0
	damageRestore = 0.25

["Quality Failure Chances"]
	#Chance that forging with WELL quality fails
	#Range: 0.0 ~ 1.0
	failOnWellQualityChance = 0.1
	#Chance that forging with EXPERT quality fails
	#Range: 0.0 ~ 1.0
	failOnExpertQualityChance = 0.05

["Blueprint & Tool Types"]
	#List of available tool types for blueprints. Default options: sword, axe, pickaxe, shovel, hoe. You may freely add or remove types.
	#To add a custom blueprint type: add it to availableToolTypes, then define its display name in your lang file.
	#Template format: "availableToolTypes": ["sword", "axe", "your_custom_type"]
	#Lang format: tooltype.overgeared.your_custom_type
	availableToolTypes = ["ARMOR", "WEAPON", "TOOL"]
	#List of hidden tool types for blueprints. These exist but do NOT appear in the Drafting Table.
	hiddenToolTypes = ["SWORD", "PICKAXE", "SHOVEL", "AXE", "HOE", "SPEAR", "MULTITOOL", "PLATED_ARMOR", "FINER_WEAPON", "FINER_TOOL", "INFERNAL_EQUIPMENT", "DRACONIC_ARMAMENT", "LEGENDARY_ARMAMENT"]
	#Uses required to reach the next quality after Expert
	#Range: 0 ~ 1000
	expertMaxUse = 30
	#Uses required to reach the next quality after Well
	#Range: 0 ~ 1000
	wellMaxUse = 15
	#Uses required to reach the next quality after Poor
	#Range: 0 ~ 1000
	poorMaxUse = 5
	#Only increase blueprint's use if you get Expert or above in minigame.
	expertAboveIncreaseBlueprintToggle = true

["Knapping Settings"]
	#Fallback: Allow getting rocks by using flint on stone when no datapack interaction is found
	useFlintGetRock = true
	#Fallback: Chance to drop a rock when using flint on stone if datapack values are unavailable
	#Range: 0.0 ~ 1.0
	rockDroppingChance = 0.1
	#Fallback: Chance for flint breaking when flint is used on stone if datapack values are unavailable
	#Range: 0.0 ~ 1.0
	flintBreakingChance = 0.1

["Arrow Fletching Settings"]
	#Enable or disable all Fletching recipes and related tab
	enableFletchingRecipes = true
	#Toggle for the ability to tip iron, steel, diamond arrows.
	enableUpgradeArrowTipping = true
	#How many arrows can a bottle of potion tip before it's depleted
	#Range: > 0
	maxPotionTipping = 8
	#Enable or disable Dragon Breath's brewing recipe
	enableDragonBreathRecipe = true
	#Enable or disable arrow tipping into potion arrow
	enableTipping = true

["Minigame Common Settings"]
	#Toggle for the forging minigame
	enableMinigame = true
	#How likely it is for the player to get Masterwork when getting Perfectly Forged. Set to 0 to disable it.
	#Range: 0.0 ~ 1.0
