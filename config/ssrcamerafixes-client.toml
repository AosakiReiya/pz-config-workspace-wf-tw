
#Overhead Preset
[camera]
	#Vertical offset (in blocks) for the OVERHEAD state of the shoulder cycle keybind. SSR owns the right/left X offset and most other camera knobs; this is the only value we still own, since SSR's preset cycling is per-axis and can't represent a coupled X=0 + high Y preset directly.
	#Range: -2.0 ~ 4.0
	cameraOverheadOffsetY = 1.2
	#If true, suppress SSR's idle camera auto-rotation toward the player's facing direction. SSR's followPlayerRotations feature lerps the camera back toward player.yRot after the configured idle delay; some users find this disorienting. Setting this to true overrides SSR's behavior at render time without modifying SSR's own config file.
	disableFollowPlayerRotations = true
	#Behavior of the character model while idle (not pressing WASD) and rotating the camera. VANILLA_3RD_PERSON: body and head turn 1:1 with the camera, no 90-degree cap, like the regular Minecraft 3rd-person camera. DECOUPLED: player.yRot is pinned, body and head stay put while the camera orbits the model; the body realigns when you start moving. SSR_DEFAULT: leave SSR's stock behavior alone (yRot drifts toward the camera up to a 90-degree cap).
	#Allowed Values: VANILLA_3RD_PERSON, DECOUPLED, SSR_DEFAULT
	idleBehavior = "DECOUPLED"

